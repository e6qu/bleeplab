name: Bleeplab CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      - run: make check-workflow-timeouts
      - run: go test -tags noui -count=1 -timeout 8m ./...

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@v2.2.0
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run typecheck
        working-directory: web
      - run: bun run test
        working-directory: web
      - run: bun run build
        working-directory: web

  shauth-sso:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/checkout@v7.0.0
        with:
          repository: e6qu/shauth
          ref: 74735a1710fa69d472e7eb27ae95ce317c7c1a3d
          path: shauth
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      - uses: oven-sh/setup-bun@v2.2.0
      - run: npm ci
        working-directory: shauth
      - run: npx playwright install --with-deps chromium
        working-directory: shauth
      - run: SHAUTH_SOURCE_DIR="$GITHUB_WORKSPACE/shauth" make shauth-sso-test

  runner-sockerless:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/checkout@v7.0.0
        with:
          repository: e6qu/sockerless
          path: sockerless
      - run: SOCKERLESS_ROOT="$GITHUB_WORKSPACE/sockerless" make runner-sockerless-test
