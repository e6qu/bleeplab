name: Bleeplab CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      - run: go test -tags noui -count=1 -timeout 8m ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@v2.2.0
      - run: bun install --frozen-lockfile
        working-directory: web
      - run: bun run typecheck
        working-directory: web
      - run: bun run test
        working-directory: web
      - run: bun run build
        working-directory: web

  runner-sockerless:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/checkout@v7.0.0
        with:
          repository: e6qu/sockerless
          path: sockerless
      - run: SOCKERLESS_ROOT="$GITHUB_WORKSPACE/sockerless" make runner-sockerless-test
