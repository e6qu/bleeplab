name: Publish Bleeplab containers

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-bleeplab-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/e6qu/bleeplab
  RUNNER_IMAGE: ghcr.io/e6qu/bleeplab-runner

jobs:
  metadata:
    name: Container tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      published_at: ${{ steps.published_at.outputs.value }}
    steps:
      - id: tag
        name: Derive short commit SHA tag
        env:
          SHA: ${{ github.sha }}
        run: echo "value=${SHA::12}" >> "$GITHUB_OUTPUT"
      - id: published_at
        name: Record release publication time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  build:
    name: Bleeplab images (${{ matrix.arch.suffix }})
    needs: metadata
    runs-on: ${{ matrix.arch.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { platform: linux/amd64, runner: ubuntu-latest, suffix: amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm, suffix: arm64 }
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish native architecture server image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.arch.platform }}
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}:${{ needs.metadata.outputs.tag }}-${{ matrix.arch.suffix }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.published_at }}
          cache-from: type=gha,scope=bleeplab-${{ matrix.arch.suffix }}
          cache-to: type=gha,scope=bleeplab-${{ matrix.arch.suffix }},mode=max
      - name: Build and publish native architecture runner image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: Dockerfile.runner
          platforms: ${{ matrix.arch.platform }}
          push: true
          provenance: false
          tags: ${{ env.RUNNER_IMAGE }}:${{ needs.metadata.outputs.tag }}-${{ matrix.arch.suffix }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.published_at }}
          cache-from: type=gha,scope=bleeplab-runner-${{ matrix.arch.suffix }}
          cache-to: type=gha,scope=bleeplab-runner-${{ matrix.arch.suffix }},mode=max

  manifest:
    name: Bleeplab multi-architecture manifests
    needs: [metadata, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish multi-architecture manifests
        env:
          TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools create --tag "$IMAGE:$TAG" "$IMAGE:$TAG-amd64" "$IMAGE:$TAG-arm64"
          docker buildx imagetools create --tag "$RUNNER_IMAGE:$TAG" "$RUNNER_IMAGE:$TAG-amd64" "$RUNNER_IMAGE:$TAG-arm64"

  prune:
    name: Retain 20 Bleeplab releases
    needs: [metadata, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete package versions outside the newest 20 releases
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner_type="$(gh api "repos/$GITHUB_REPOSITORY" --jq '.owner.type')"
          case "$owner_type" in
            Organization) namespace=orgs ;;
            User) namespace=users ;;
            *) echo "::error::Unsupported GitHub package owner type: $owner_type"; exit 1 ;;
          esac
          retain_releases() {
            local package="$1" versions_file keep_tags
            versions_file="$(mktemp)"
            gh api --paginate "/$namespace/$OWNER/packages/container/$package/versions?per_page=100" | jq -s 'add' > "$versions_file"
            keep_tags="$({
              jq -r '[ .[] | select(any(.metadata.container.tags[]?; test("^[0-9a-f]{12}$"))) ] | sort_by(.created_at) | reverse | .[:20] | .[] | .metadata.container.tags[] | select(test("^[0-9a-f]{12}$"))' "$versions_file" \
                | while IFS= read -r tag; do printf '%s\n' "$tag" "$tag-amd64" "$tag-arm64"; done
            } | jq -R . | jq -s 'unique')"
            jq -r --argjson keep "$keep_tags" '
              .[] | . as $version | ($version.metadata.container.tags // []) as $tags
              | select(($tags | length == 0) or ([ $tags[] | select(. as $tag | $keep | index($tag) != null) ] | length == 0)) | $version.id
            ' "$versions_file" | while IFS= read -r version_id; do
              gh api --method DELETE "/$namespace/$OWNER/packages/container/$package/versions/$version_id"
            done
          }
          retain_releases bleeplab
          retain_releases bleeplab-runner
